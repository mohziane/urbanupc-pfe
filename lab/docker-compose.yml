# UrbanUpC — Legacy PHP Stack (Phase 0 / Honeypot)
# Services: nginx | php (Apache 2.4.49 + PHP 8.1 FPM) | db (MySQL 8.0) | adminer
#
# Phase 1 (Next.js/FastAPI) is preserved in git — branch: main
# To switch back: git stash && git checkout phase1 (or restore from commit e396f63)

services:

  # ── Reverse Proxy ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.20.1-alpine
    container_name: corpnet-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /var/log/corpnet/nginx:/var/log/nginx
      # Trust the internal CA so we can verify MaFormation / MaCandidature certs.
      - ./internal-apps/nginx/certs/ca.crt:/etc/nginx/conf.d/internal-ca.crt:ro
    depends_on:
      - php
    networks:
      - corpnet-net
      - maformation_proxy_net
      - macandidature_proxy_net
    restart: unless-stopped

  # ── Apache 2.4.49 + PHP 8.1 FPM ───────────────────────────────────────────
  # Port 8888 → Apache direct (Nginx not in path) — CVE-2021-41773 exploitable
  php:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: corpnet-php
    ports:
      - "8888:80"
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - MYSQL_DB=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./corpnet:/var/www/html/corpnet   # live PHP source — no rebuild needed
      - /var/log/corpnet/apache:/opt/apache2/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - corpnet-net
    restart: unless-stopped

  # ── MySQL 8.0 ─────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: corpnet-db
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./scripts/mysql.cnf:/etc/mysql/conf.d/corpnet.cnf:ro
      - mysql-logs:/var/log/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corpnet-net
    restart: unless-stopped

  # ── Adminer — DB GUI (port 8080) ──────────────────────────────────────────
  adminer:
    image: adminer:4.6.2
    container_name: corpnet-adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - corpnet-net
    restart: unless-stopped

volumes:
  mysql-data:
  mysql-logs:

networks:
  corpnet-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24
  # Networks owned by the internal-apps stack — corpnet-nginx joins them only
  # to reverse-proxy /maformation/ and /candidat/ to internal_nginx.
  maformation_proxy_net:
    external: true
    name: internal-apps_maformation_proxy_net
  macandidature_proxy_net:
    external: true
    name: internal-apps_macandidature_proxy_net
