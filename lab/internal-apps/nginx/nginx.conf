worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"referer":"$http_referer",'
            '"user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"upstream":"$upstream_addr",'
            '"upstream_status":"$upstream_status",'
            '"upstream_time":"$upstream_response_time",'
            '"vhost":"$host"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    keepalive_timeout  65;

    server_tokens off;
    client_max_body_size 6m;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # ────────── MaFormation — TLS on :8443 (loopback only via compose) ──────────
    server {
        listen 8443 ssl http2;
        server_name maformation.corpnet.local _;

        ssl_certificate     /etc/nginx/certs/maformation.crt;
        ssl_certificate_key /etc/nginx/certs/maformation.key;

        location = /healthz {
            access_log off;
            proxy_pass http://maformation_app:3000;
            include /etc/nginx/conf.d/proxy-common.conf;
        }

        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://maformation_app:3000;
            include /etc/nginx/conf.d/proxy-common.conf;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://maformation_app:3000;
            include /etc/nginx/conf.d/proxy-common.conf;
        }

        location / {
            proxy_pass http://maformation_app:3000;
            include /etc/nginx/conf.d/proxy-common.conf;
        }
    }

    # ────────── MaCandidature — TLS on :8444 ──────────
    server {
        listen 8444 ssl http2;
        server_name macandidature.corpnet.local _;

        ssl_certificate     /etc/nginx/certs/macandidature.crt;
        ssl_certificate_key /etc/nginx/certs/macandidature.key;

        location = /healthz {
            access_log off;
            proxy_pass http://macandidature_app:3000;
            include /etc/nginx/conf.d/proxy-common.conf;
        }

        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://macandidature_app:3000;
            include /etc/nginx/conf.d/proxy-common.conf;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://macandidature_app:3000;
            include /etc/nginx/conf.d/proxy-common.conf;
        }

        location / {
            proxy_pass http://macandidature_app:3000;
            include /etc/nginx/conf.d/proxy-common.conf;
        }
    }
}
