# ════════════════════════════════════════════════════════════════════
# Catalogue P_total — Preuves d'audit attendues par une homologation
# ANSSI de type 2 sur un Espace Numérique de Travail universitaire.
#
# Méthodologie : triangulation de TROIS référentiels (T-1.2 §1.4.1) :
#   S1. ANSSI — Homologation en 9 étapes simples (avril 2020)
#   S2. ISO/IEC 27002:2022 — 93 contrôles de sécurité
#   S3. OWASP ASVS v4.0.3 — niveau L2 (~280 contrôles applicatifs)
#
# Chaque entrée du catalogue est classée en :
#   A : automatique totale  (collecte par script/API, machine-readable,
#                            interprétation sans jugement contextuel)
#   B : semi-automatique    (collecte auto + qualification/validation
#                            humaine, ou format mixte)
#   C : manuel              (audit organisationnel, interview, document
#                            signé, jugement humain requis)
#
# Le codage suit le double-aveugle : critères opposables fixés *a priori*
# en T-1.2 §1.4.2, sans ajustement post-hoc.
# ════════════════════════════════════════════════════════════════════

meta:
  version: "1.0"
  date: "2026-05-15"
  scope: "ENT universitaire, démarche d'homologation type 2"
  references:
    S1: "ANSSI — L'homologation de sécurité en 9 étapes simples (avril 2020)"
    S2: "ISO/IEC 27002:2022 — 93 contrôles"
    S3: "OWASP ASVS v4.0.3 — niveau L2"

# Échelle de codage (rappel)
codage:
  A:
    label: "Automatique totale"
    poids: 1.0
    criteres:
      - "Collectable par script, API ou scan périodique"
      - "Sans intervention humaine répétée"
      - "Interprétation sans jugement contextuel"
      - "Sortie machine-readable (JSON, CSV, XML…)"
  B:
    label: "Semi-automatique"
    poids: 0.5
    criteres:
      - "Collecte automatisable mais validation humaine légère requise"
      - "OU jugement contextuel limité"
      - "OU format mixte (auto + complément humain)"
  C:
    label: "Manuel"
    poids: 0.0
    criteres:
      - "Audit organisationnel, observation, interview"
      - "Document signé ou rédaction libre"
      - "Jugement humain contextuel requis"

